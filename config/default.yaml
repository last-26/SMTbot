bot:
  mode: demo
  poll_interval_seconds: 5
  timezone: UTC
  starting_balance: 500.0  # 2026-04-26 demo reset — flat-$ override RISK_AMOUNT_USDT=10 → 1R = $10

trading:
  # 5 pair — hepsi aynı anda aktif (max_concurrent_positions=5, queue yok).
  # 2026-04-19 (pm): 7→5 geri düşürüldü. Post-pivot demo pass'ta 3 pozisyon
  # `place_algo_order: (no message)` ile UNPROTECTED açıldı (sCode 51277 — OCO
  # trigger SL zaten aşılmış). Kök neden: (a) Coinalyze 429 global event-loop
  # 57s blokluyor, (b) pending-poll run_once başında tek sefer → fill→attach
  # gecikmesi ~240s, (c) zone SL floor bypass. 7→5 per-slot margin'i +40%
  # açar ($714→$1000), cycle bütçesini 180s-üstü worst-case'den kurtarır,
  # attach race'i daraltır.
  # 2026-04-19 (eve, pre-migration): ADA ↔ DOGE swap. ADA demo OI'da platform
  # tavanına dayandı (sCode 54031), her cycle reddedildi.
  # 2026-04-25 (Bybit migration): BNB ↔ XRP swap. Operatör tercihi —
  # XRP artık 5'inci aktif sembol; BNB override'ları (harmless) YAML'da
  # bırakıldı, geri almak tek satır. Toplam kalan: BTC/ETH/SOL/DOGE/XRP.
  symbols: [BTC-USDT-SWAP, ETH-USDT-SWAP, SOL-USDT-SWAP, DOGE-USDT-SWAP, XRP-USDT-SWAP]
  entry_timeframe: 3m
  htf_timeframe: 15m
  ltf_timeframe: 1m
  risk_per_trade_pct: 1.0   # legacy percent-mode fallback (used only when both auto and override are off).
  # Operator-set absolute $R override (escape hatch). When set, bypasses
  # auto mode + percent mode and uses this flat USDT number directly as
  # max_risk. Null = let auto / percent mode decide. Env var
  # `RISK_AMOUNT_USDT` wins over this YAML value (kept commented in
  # .env.example as a manual escape hatch). Safety rail: override ≤ 10%
  # of account_balance (rr_system enforces).
  risk_amount_usdt: null
  # 2026-04-26 — auto-R mode. When `risk_amount_usdt` is null AND this is
  # > 0, every trade sizes R = realized_wallet_balance × pct, freshly
  # probed at entry time. "realized" reads Bybit V5 `totalWalletBalance`
  # which EXCLUDES unrealized PnL — so R doesn't drift with open-position
  # mark-to-market. 0.02 = 2%; per-slot exposure across 5 concurrent
  # positions = max 10% theoretical drawdown (each slot risks 2%).
  # Probe failure → fallback to env override or percent mode.
  auto_risk_pct_of_wallet: 0.02
  # Round-trip taker reserve baked into sizing: `effective_sl_pct = sl_pct +
  # fee_reserve_pct`, shrinks notional so a stop-out caps near the nominal $R
  # AFTER paying entry + exit taker fees. 0.001 = ~2× Bybit demo taker (0.055%).
  # TP stays at `sl_dist × rr_ratio` — fee compensation via size, not TP width.
  fee_reserve_pct: 0.001
  max_leverage: 75
  # TP2 (runner) RR. With partial_tp_enabled=true (default), half the position
  # exits at partial_tp_rr (1.5R) and the remaining half runs to this value.
  # 2026-04-19 (post-pivot): hard 1:N RR enforced via execution.target_rr_ratio.
  # `apply_zone_to_plan` now forces the final primary TP to entry ± N × sl_dist
  # regardless of heatmap geometry, after operator log showed actual TP landing
  # at 8-12R despite the symbol_decision claiming 4.5. Keep default_rr_ratio
  # aligned with execution.target_rr_ratio so the pre-zone fallback
  # (entry_signals path) also enforces the same hard cap.
  # 2026-04-21 (eve): hard cap tightened 3.0 → 2.0. Operator observation:
  # most wins wicked TP3 and reversed before the OCO market-trigger could
  # fill (maker-TP helps but 3R TP is still far from 2R MFE-lock). 1:2 RR
  # brings TP closer to the typical post-zone-fill momentum envelope.
  # 2026-04-28: 2.0 → 1.5 paired with per-symbol SL-floor tighten (-25%).
  # Scalp-native pivot — faster TP resolution at the cost of higher
  # breakeven WR (33% → 40%). MUST stay in lockstep with
  # execution.target_rr_ratio (test_default_yaml_runner_tp_is_hard_1_2
  # guards this).
  default_rr_ratio: 1.5
  # 2026-04-18: lowered 2.0 → 1.5 to ease `htf_tp_ceiling` rejections on 15m
  # HTF. With buffer=0.2×ATR the clipped-TP RR often lands 1.6-1.9 on
  # DOGE/SOL/XRP — legitimate setups that still clear 2× round-trip fees +
  # slippage. 15m HTF is not a "major" TF; VWAP (1m/3m/15m) already filters
  # direction. Consider raising back to 2.0 if TP1 hit rate < 40% on clipped
  # plans post-Sprint-3.
  # 2026-04-28: 1.5 → 1.2 because default_rr_ratio dropped to 1.5; min_rr
  # must stay below the hard cap so HTF-clipped plans still clear the gate.
  min_rr_ratio: 1.2
  max_concurrent_positions: 5
  contract_size: 0.01
  # Operator-side per-symbol leverage caps (on top of Bybit instrument caps).
  # Effective ceiling = min(trading.max_leverage, bybit_cap, symbol_cap).
  # ETH demo wicks burn high-leverage positions even when SL discipline holds,
  # so cap it at 30x regardless of the global 75x. BTC stays wide (tighter
  # liq behavior, deeper book). SOL inherits the Bybit 50x cap automatically.
  # DOGE + XRP capped at 30x — momentum-driven pairs have sharp 3m wicks
  # that blow high-leverage positions even when SL structure holds.
  symbol_leverage_caps:
    ETH-USDT-SWAP: 30
    DOGE-USDT-SWAP: 30
    XRP-USDT-SWAP: 30
    ADA-USDT-SWAP: 30   # thin-book alt, DOGE/XRP pattern
    # BNB uncapped — major-class, inherits Bybit instrument cap
  # Phase 6.9 B3 — per-symbol swing_lookback override for SL sourcing. Thin-
  # book pairs (DOGE/XRP) need a wider lookback window before fallback swing
  # SL kicks in — 18 `no_sl_source` rejects over 35 trades traced to here.
  # Unlisted symbols fall back to analysis.swing_lookback (20).
  swing_lookback_per_symbol:
    DOGE-USDT-SWAP: 30
    XRP-USDT-SWAP: 30
    ADA-USDT-SWAP: 30   # thin 3m book, match DOGE/XRP
  # Multi-pair settle budgets — wait after set_symbol / set_timeframe so
  # the heavy SMT Overlay Pine has time to recompute before we read.
  symbol_settle_seconds: 6.0
  tf_settle_seconds: 3.5
  pine_settle_max_wait_s: 10.0
  pine_settle_poll_interval_s: 0.3
  # Post-flip grace — _wait_for_pine_settle only watches Signals.last_bar,
  # but Oscillator can lag a beat (worst on 1m, where last_bar ticks every
  # wall-clock minute regardless of full table re-render). 1.0s = enough
  # for the rest of the tables to catch up; per cycle cost ≈ 4s for 4 TF
  # switches × 1 symbol, total ~12s for 3 pairs.
  pine_post_settle_grace_s: 1.0

circuit_breakers:
  # TEMPORARY 2026-04-18: all three breakers loosened pre-RL so the bot can
  # accumulate 50+ closed trades without tripping a halt. Sprint 3 baseline
  # hit consecutive-losses halt at trade #6 (5L/1W). RL training needs volume
  # (WINs AND LOSSes) more than protection at this stage. RE-TIGHTEN post-RL:
  #   max_daily_loss_pct: 40.0 → 15.0
  #   max_consecutive_losses: 9999 → 5
  #   max_drawdown_pct: 40.0 → 25.0
  max_daily_loss_pct: 40.0
  max_consecutive_losses: 9999
  max_drawdown_pct: 40.0
  cooldown_hours: 24

analysis:
  # 2026-04-18 data (35 trades): score-5 bucket went 0/11, scores 6+ went
  # 5/6 (83%), scores 3-4 went 5/11 (45%), score 2 tripped once. Raising
  # the floor from 2 → 3 drops the worst bucket while keeping the sweet
  # spot (4+) intact. If reject flow cratered, drop back to 2 and instead
  # gate on analysis.require_structural_factor (not yet implemented).
  #
  # 2026-04-22 (gece) Pass 1 tuning: operator bump 3 → 3.75 after 42-trade
  # threshold sweep. Sweep showed 3.5/3.75 both lift net_R (+13.46 → +16.08)
  # while 4.0+ over-filters. Raising to 3.75 cuts 5 trades from the window
  # (4 of them losses), WR shifts 47.6% → 51.4% on the historical sample.
  # Re-eval after 30 new closed trades post-restart — if accept rate drops
  # below 0.5/day sustained, retreat to 3.5.
  min_confluence_score: 3.75
  candle_buffer_size: 500
  swing_lookback: 20
  sr_min_touches: 3
  sr_zone_atr_mult: 0.5
  session_filter:
    - london
    - new_york
  # Phase 6.9 B4 — per-symbol session override. NY + ASIAN went 0/6 post-
  # cutoff; thin-book pairs (SOL/DOGE/XRP) only produce reliable entries
  # during LONDON liquidity. BTC/ETH inherit the global filter above.
  # Override REPLACES (not merges) — a pair listed here ignores the global.
  session_filter_per_symbol:
    SOL-USDT-SWAP: [london]
    DOGE-USDT-SWAP: [london]
    XRP-USDT-SWAP: [london]
    ADA-USDT-SWAP: [london]   # thin alt; BNB inherits global (london+new_york)
  # Madde D — push SL past HTF zones + cap TP (reject if trimmed RR <
  # min_rr_ratio). 2026-04-19 (night): TEMPORARILY flipped OFF. Range-bound
  # tape + new hard 1:3 RR target → every BULLISH setup rejecting on
  # `htf_tp_ceiling` because 15m resistance sat inside 1.5R of entry (2h
  # demo pass: 17 NO_TRADE, 10 of them this gate, only 1 order placed on
  # BNB via vwap_retest). Operator wants indicator-reversal signals to
  # execute cleanly during data collection. Disabling this flag ALSO turns
  # off `_push_sl_past_htf_zone` (SL widening past HTF zones) — per-symbol
  # `min_sl_distance_pct` floors (0.4–1.0%) remain the primary wick-
  # protection layer. Re-evaluate after Phase 9 GBT: if HTF-ceiling
  # distance shows positive WR impact, restore as hard gate; if only the
  # SL-push side has lift, split the flag into two separate knobs
  # (htf_sr_tp_ceiling_enabled + htf_sr_sl_push_enabled); if neither
  # shows lift, leave off. When flipping back on, bump `rl.clean_since`
  # again so the disabled-window trades don't pollute the clean set.
  htf_sr_ceiling_enabled: false
  htf_sr_buffer_atr: 0.2
  # Phase 6.9 B2 — per-symbol HTF S/R TP-ceiling buffer. SOL 0/3 post-cutoff
  # LOSSes all bumped the HTF TP ceiling; the global 0.2×ATR padding clips
  # SOL's wide-ATR TP too aggressively. Lower = ceiling kicks in closer to
  # the HTF zone (more room for TP). Unlisted → htf_sr_buffer_atr (0.2).
  htf_sr_buffer_atr_per_symbol:
    SOL-USDT-SWAP: 0.10
    DOGE-USDT-SWAP: 0.15
    XRP-USDT-SWAP: 0.15
    ADA-USDT-SWAP: 0.15   # alt-class; BNB inherits global 0.2 (major-class)
  # Fee-aware min TP distance (fraction of entry price). 0.004 = 0.4% — rejects
  # tp-too-tight plans where 3× 0.05% taker fee + slippage eats the whole R.
  # The ETH 05:49 trade had 0.19% TP and lost -3.91R to fees+wick; 0.4% floor
  # is ~2× round-trip fee cost, leaves breathing room for slippage.
  min_tp_distance_pct: 0.004
  # Min SL distance floor (fraction of entry price). Sub-floor Pine OB/FVG
  # stops are WIDENED to this distance (not rejected) — at high leverage a
  # 0.05–0.1% stop gets wicked out instantly even when direction is right.
  # Widening keeps R constant (notional = risk / sl_pct auto-shrinks) while
  # giving the fill real breathing room above book + wick noise. 0.5% is
  # ~10× the ~0.05% demo-book spread and bigger than typical 3m wicks on
  # BTC/ETH. Live session 04:17–11:25Z rejected 264 BTC/ETH signals at 0.003
  # (tight OB/FVG) — widening instead of rejecting restores flow.
  min_sl_distance_pct: 0.005
  # Phase 7.A1 — per-symbol SL floor override. Sprint 3 diagnostic: every
  # trade landed at exactly sl_pct=0.500% because the global 0.005 floor
  # was pegged by nearly every Pine OB/FVG width. Wide-ATR pairs (SOL/DOGE/
  # XRP) routinely need more breathing room than BTC/ETH. Values below sit
  # ~1–1.5× typical 3m ATR-as-% per symbol. Unlisted → global.
  #
  # 2026-04-24: REVERTED the 2026-04-23 Pass 2 floor bump. A 15-trade window
  # (6 pre-bump, 9 post-bump) showed WR collapse 66.7%→22.2%, net −10.16R,
  # hold time 5.6× longer (70→394 min). Fixed 1:2 RR means a wider SL
  # mechanically widens TP in lockstep; wider TPs got whipsawed in the
  # choppy market regime and MFE-lock (1.3R absolute R-multiple) became
  # harder to trigger at the wider absolute price distance. zone_timeout_cancel
  # rejects also spiked 3.7× (14→52) because widened zone edges missed fills.
  # Reverted values = Pass 1 profile that produced +13.46R over 42 trades.
  #
  # 2026-04-28 SCALP TIGHTEN: reduced ~25% across the board paired with a
  # simultaneous RR cut (target_rr_ratio 2.0 → 1.5) to keep 1:RR mechanics
  # symmetric. Tighter SL → tighter TP → faster TP/SL resolution → more
  # data per unit time, scalp-native trade-shape profile. Breakeven WR at
  # 1.5 RR = 40% (was 33% at 1:2). Tradeoff: more wick stop-outs vs faster
  # cycles. Re-eval after 20 closed trades — if WR <40%, revert this block
  # AND target_rr_ratio together. NEVER tighten SL without lowering RR
  # (2026-04-23 confirmed asymmetric tightening at fixed RR is destructive).
  min_sl_distance_pct_per_symbol:
    BTC-USDT-SWAP: 0.003    # 2026-04-28 0.004 → 0.003 (scalp tighten)
    ETH-USDT-SWAP: 0.006    # 2026-04-28 0.008 → 0.006 (scalp tighten)
    SOL-USDT-SWAP: 0.008    # 2026-04-28 0.010 → 0.008 (scalp tighten)
    DOGE-USDT-SWAP: 0.006   # 2026-04-28 0.008 → 0.006 (scalp tighten)
    XRP-USDT-SWAP: 0.006    # 2026-04-28 0.008 → 0.006 (scalp tighten)
    ADA-USDT-SWAP: 0.006    # parallel tighten (symbol not watched)
    BNB-USDT-SWAP: 0.004    # 2026-04-28 0.005 → 0.004 (scalp tighten)
  # Confluence weight overrides — empty = DEFAULT_WEIGHTS from
  # src/analysis/multi_timeframe.py (Moderate rebalance baseline below is
  # already baked into code). Only keys set here override; others stay at
  # their defaults. Unknown keys trigger a warning at load time.
  # Phase 7.A — factor weight overrides post-Sprint-3 pivot:
  #   at_order_block: OB on 3m entry TF is noise (mitigation flips too
  #     fast); to be re-added as HTF-only (15m/1h) in Phase 7.C. See
  #     CLAUDE.md "Strategy Pivot 2026-04-19 — Layer 1 (5-pillar)".
  #   oscillator_signal: regular BUY/SELL from Cipher-B overlapped with
  #     momentum factors and triggered at MA crosses; only GOLD_BUY /
  #     *_DIV high-conviction variant kept (via oscillator_high_conviction).
  #   liquidity_pool_target: Pine pool detection emits too many hairline
  #     pools; to be replaced by ATR-scaled S/R cluster target in 7.A.
  #   htf_trend_alignment → 0 (A3): direction-picker only now. Tie-break
  #     in calculate_confluence already consults `state.trend_htf`
  #     directly, so zeroing the score weight removes the bias from
  #     close-score decisions while preserving the tie-break role and
  #     the factor tag on trade records (weight=0 still appends).
  confluence_weights:
    # 2026-04-19 rebalance — scalp-native emphasis (oscillator + VWAP +
    # money-flow + divergence dominate; structural pillars demoted). These
    # YAML entries match DEFAULT_WEIGHTS in src/analysis/multi_timeframe.py
    # so an operator sees the full stack here; empty dict would also pick
    # up the same numbers via the default merge.
    htf_trend_alignment: 0.5
    mss_alignment: 0.75
    at_order_block: 0.6
    at_fvg: 0.75
    at_sr_zone: 0.75
    recent_sweep: 1.0
    ltf_pattern: 0.75
    oscillator_momentum: 0.75
    oscillator_signal: 0.75
    oscillator_high_conviction_signal: 1.5
    vmc_ribbon: 0.5
    ltf_momentum_alignment: 0.75
    money_flow_alignment: 1.0
    divergence_signal: 1.25
    displacement_candle: 0.6
    liquidity_pool_target: 0.5
    # Per-TF VWAP slots demoted — composite carries the score.
    # 2026-04-19 (eve): vwap_1m_alignment 0.0 → 0.2 re-opened as a low-weight
    # probe factor. Rationale: scalp-native pivot emphasized oscillator/overlay
    # factors; 1m VWAP (tight micro-bias) was the only per-TF VWAP slot worth
    # keeping alive for Phase 9 GBT to evaluate. Composite remains the primary
    # VWAP signal (1.25). If GBT confirms signal, raise toward 0.3; if flat,
    # zero again.
    vwap_1m_alignment: 0.2
    vwap_3m_alignment: 0.0
    vwap_15m_alignment: 0.0
    vwap_composite_alignment: 1.25
    # Derivatives one-slot group (elif-chained at most one fires per cycle).
    derivatives_contrarian: 0.7
    derivatives_capitulation: 0.6
    derivatives_heatmap_target: 0.5
    session_filter: 0.25
    # 2026-04-28 — scalp-confirmation soft factors. 1m EMA21-55 ribbon
    # bias + 1m MSS direction. Both fire when the 1m signal aligns with
    # the proposed trade direction — small bonuses (0.25 each) so a
    # 3.75 confluence threshold setup with both 1m signals aligned
    # picks up an extra +0.5 scalp vote without dominating the score.
    # Source: LTFState (vmc_ribbon, last_mss) — no extra TV round-trip.
    ltf_ribbon_alignment: 0.25
    ltf_mss_alignment: 0.25
    # 2026-04-28 — 15m MSS journal-only by default. Operator wants the
    # 15m last_mss CAPTURED in `confluence_factors` so Pass 3 GBT can
    # train on it; weight 0 keeps it out of live scoring. Flip to 0.25
    # if Pass 3 importance shows a lift (matches the 1m MSS weight).
    htf_mss_alignment: 0.0
  # Example override block (uncomment + edit to hand-tune before Phase 7 RL):
  # confluence_weights:
  #   htf_trend_alignment: 0.75
  #   mss_alignment: 0.75
  #   oscillator_momentum: 0.75
  #   oscillator_signal: 0.75
  #   ltf_momentum_alignment: 0.75
  #   vwap_1m_alignment: 0.3
  #   vwap_3m_alignment: 0.3
  #   vwap_15m_alignment: 0.4
  #   money_flow_alignment: 0.6           # Phase 6.9 A1
  #   liquidity_pool_target: 0.5          # Phase 6.9 A2
  #   oscillator_high_conviction_signal: 1.25  # Phase 6.9 A3 (GOLD_BUY / *_DIV)
  # Phase 6.9 A1 — MFI bias magnitude floor. Below this the BULLISH/BEARISH
  # tag is noise. Raise (e.g. 3.0) to only take strong money-flow skews.
  min_rsi_mfi_magnitude: 2.0
  # Phase 6.9 A2 — nearest Pine liquidity pool must sit within this ×ATR
  # from price for `liquidity_pool_target` to fire. Lower = pickier.
  liquidity_pool_max_atr_dist: 3.0
  # Phase 6.9 A4 — VWAP hard veto. When `true`, reject entries sitting on
  # the wrong side of EVERY available session-anchored VWAP (1m/3m/15m) for
  # the proposed direction (bullish needs price >= one VWAP; bearish <=).
  # Missing (zero) VWAPs are skipped; no-VWAP state is fail-open. Opt-in —
  # recommended for liquidity-driven futures runs after A+B validation.
  vwap_hard_veto_enabled: false
  # Phase 7.A5 — EMA stack momentum veto on the entry TF. When `true`,
  # reject entries that oppose the local stack regime:
  #   * bull stack (price > EMA21 > EMA55) blocks bearish entries
  #   * bear stack (price < EMA21 < EMA55) blocks bullish entries
  # Neutral stacks and bars with < slow_period closes fail open.
  # Enabled by default in the pivot plan — rule #1 of the new strategy is
  # "don't fight the EMA stack on the entry TF". Flip off for a clean
  # attribution window if you want to measure the veto's lift in isolation.
  ema_veto_enabled: true
  ema_veto_fast_period: 21
  ema_veto_slow_period: 55
  # Phase 7.A6 — cross-asset BTC/ETH veto. When `true`, altcoin entries
  # are rejected if BOTH BTC and ETH pillars show a fresh opposing EMA
  # stack. Reuses the ema_veto_* periods above. Fails open when either
  # pillar is missing / neutral / stale (> max_age_s). Rule #2 of the
  # pivot strategy: don't fight a united BTC+ETH tape on altcoins.
  # 2026-04-30 Pass 3 Faz-A apply → 2026-05-01 REVERT + mode tighten.
  # Faz-A 19 trade post-window WR 36.8% (-5.02R) vs PRE son-19 63.2% (+5.85R).
  # Operator pair-bound model (cross_asset_veto_mode: "eth_anchored"):
  #   * BTC entry: ETH ters → reddet (yeni gate, "both" modunda yoktu)
  #   * ETH entry: BTC ters → reddet (yeni gate, "both" modunda yoktu)
  #   * Altcoin entry: BTC OR ETH ters → reddet (mevcut AND'den daha sıkı)
  #   * Pillar bias missing / neutral / stale → fail-CLOSED (her yönü blokla)
  # "both" mode = legacy davranış (altcoin only, BTC AND ETH ters, fail-open)
  # — revert için YAML'da "both" yazıp restart yeter, kod değişmez.
  cross_asset_veto_enabled: true
  cross_asset_veto_mode: eth_anchored
  cross_asset_veto_max_age_s: 300.0
  # Phase 7.D1 — premium/discount zone veto. When `true`, longs that sit
  # above the last N-bar swing midpoint and shorts below it are rejected
  # as `wrong_side_of_premium_discount`. Sprint 3 forensics: market-order
  # bot chronically bought premium / sold discount.
  # 2026-04-19 pivot: flipped ON for full pivot discipline.
  # 2026-04-19 (same day, later): TEMPORARILY flipped OFF — all 7 symbols
  # were stuck rejecting on this gate in a range-bound tape; operator opted
  # to let zone-based entries take over for data collection. Re-enable as a
  # *soft / weighted* factor (~10-15% weight-equivalent) once GBT reveals
  # the right form in Phase 9. When re-enabled, update CLAUDE.md hard-gate
  # list + re-pin `rl.clean_since` if the disabled-window polluted data.
  premium_discount_veto_enabled: false
  premium_discount_lookback: 40
  # Phase 7.D1 — displacement candle factor. Confirms a "real imbalance"
  # move in the trade direction within the last N closed bars. Weight is
  # configured in `confluence_weights.displacement_candle`; these control
  # the geometric gate (body ≥ atr_mult × ATR, within max_bars_ago bars).
  displacement_atr_mult: 1.5
  displacement_max_bars_ago: 5
  # Phase 7.D2 — divergence_signal bar-ago decay bands. Reads Pine's native
  # `last_wt_div` stream (BULL_REG / BEAR_REG / BULL_HIDDEN / BEAR_HIDDEN).
  # fresh_bars: full weight ceiling (≤ → 1.0×).
  # decay_bars: half weight ceiling (>fresh & ≤decay → 0.5×).
  # max_bars:   quarter weight ceiling (>decay & ≤max → 0.25×), else skip.
  divergence_fresh_bars: 3
  divergence_decay_bars: 6
  divergence_max_bars: 9
  # Phase 7.D3 — ADX trend-regime classifier + conditional factor scoring.
  # Classifier runs every cycle on entry-TF closed bars; the label (and the
  # decoded +DI/-DI) is always computed and persisted on a fill. When the
  # conditional scoring flag is on, STRONG_TREND boosts `htf_trend_alignment`
  # ×1.5 and penalises `recent_sweep` ×0.5; RANGING mirrors the ratio.
  # Flipped ON 2026-04-19 — CLAUDE.md "Regime awareness" section mandates
  # regime-gated weights as part of the post-pivot strategy.
  trend_regime_conditional_scoring_enabled: true
  adx_period: 14                       # Wilder's canonical 14-period ADX.
  trend_regime_ranging_threshold: 20.0 # ADX < this → RANGING.
  trend_regime_strong_threshold: 30.0  # ADX ≥ this → STRONG_TREND.

  # 2026-04-21 — VWAP-band zone anchor (Convention X).
  # Axis: 0.0 = lower band, 0.5 = VWAP, 1.0 = upper band. Long and short
  # anchors control where the post-only limit sits inside the ±1σ VWAP band.
  # 0.7 / 0.3 = 40% of band-half away from VWAP on the directional side
  # (Fib-lite, closer to VWAP than the former 0.5σ midpoint which equals
  # 0.75 / 0.25 in this convention). Range: long ∈ [0.5, 1.0], short ∈
  # [0.0, 0.5]. Nudge toward 0.5 (e.g. 0.65 / 0.35) to hug VWAP tighter;
  # nudge toward 1.0 / 0.0 to chase the outer band (earlier fills, looser
  # structure).
  vwap_zone_long_anchor: 0.7
  vwap_zone_short_anchor: 0.3

  # 2026-04-26 — VWAP daily-reset blackout. Pine 3m/1m/15m VWAPs all
  # anchor on the daily session change (UTC 00:00). For the first
  # ~10-30 min after reset the ±1σ band is collapsed and
  # `vwap_composite_alignment` reads near-noise → spurious soft-pillar
  # weight. Time-based reject blocks new entries AND cancels resting
  # pendings inside [-pre, +post] min around UTC midnight. Disable by
  # flipping enabled to false (knob preserved for back-compat).
  vwap_reset_blackout_enabled: true
  # 2026-04-27 — window tightened from 5/15 to 0/10. Pre-blackout window
  # was cosmetic (UTC midnight hasn't happened yet, VWAP bands still
  # stable) — operator flagged 5min-pre-midnight NO_TRADE traffic as
  # confusing UX. Post-blackout 15→10: VWAP band stdev recovers fast
  # on liquid majors at 3m TF; the last 5 min of the old 15-min post
  # window were almost always trade-permitting anyway. Total daily
  # downtime 20 min → 10 min.
  vwap_reset_blackout_window_pre_min: 0
  vwap_reset_blackout_window_post_min: 10

bybit:
  base_url: https://api-demo.bybit.com
  demo: true
  account_type: UNIFIED
  category: linear

journal:
  db_path: "data/trades.db"
  # Intra-trade snapshot writer for RL trajectory analysis. Captures live
  # mark/PnL + running MFE/MAE in R + active SL/TP + lifecycle flags +
  # derivatives/on-chain/oscillator drift every cadence_s seconds for every
  # OPEN position. Reuses cached state — zero extra Bybit / TV calls.
  position_snapshot_enabled: true
  position_snapshot_cadence_s: 300       # 5 min; validator clamps [60, 3600]

reentry:
  min_bars_after_close: 3             # cooldown in bars of entry_timeframe
  min_atr_move: 0.5                   # must move ≥ 0.5 * ATR from last exit
  require_higher_confluence_after_win: true
  require_higher_or_equal_confluence_after_loss: true

execution:
  # "cross" = account equity is a shared margin pool across all open
  # positions (so 3 slots coexist without 51008 starving new entries).
  # "isolated" = per-position silo (worse for multi-slot, safer for a
  # single-position book).
  margin_mode: cross
  # Madde E — partial TP + move SL to breakeven on TP1 fill.
  # 2026-04-19 (late night): operator flipped to false. Rationale: with hard
  # 1:3 RR cap, partial TP at 1.5R caps max win at 2.25R (0.75R + 1.5R) on
  # full-win scenarios, and int-contract rounding already shrinks actual
  # risk below the $55 nominal. Single-leg OCO at 3R keeps the full
  # planned reward on winners. Trade-off: "almost-wins" (TP1 touched, TP2
  # reverses) no longer bank the 0.75R — they become full losses under the
  # non-BE plan SL. Re-evaluate via factor-audit after ≥30 post-flip
  # closed trades. `move_sl_to_be_after_tp1` left as-is; inert when
  # partial_tp_enabled=false (no TP1 fill → no BE callback).
  partial_tp_enabled: false
  partial_tp_ratio: 0.5               # 50% of contracts exit at TP1
  partial_tp_rr: 1.5                  # TP1 at 1.5R
  move_sl_to_be_after_tp1: true
  # Buffer past entry when SL moves to breakeven after TP1 fill. BE stop sits
  # at `entry ± entry × sl_be_offset_pct`, so a "touch-back to entry" closes
  # at true net-zero after the remaining exit taker fee + small slippage.
  # 0.001 ≈ one round-trip taker on the surviving leg.
  sl_be_offset_pct: 0.001
  # Madde F — LTF reversal defensive close.
  ltf_reversal_close_enabled: true
  ltf_reversal_min_confluence: 3
  ltf_reversal_min_bars_in_position: 2
  ltf_reversal_signal_max_age: 3

  # Phase 7.C4 — zone-based limit entry. When `true`, the setup_planner
  # builds a ZoneSetup (HTF FVG / liq pool / VWAP / sweep) from the picked
  # confluence direction, rewrites plan entry/SL/TP to structural levels,
  # and places a post-only limit order. Fills are observed via PENDING →
  # FILLED lifecycle; timeout after zone_max_wait_bars entry-TF bars.
  # Flipped ON 2026-04-19 — CLAUDE.md "Zone-based entry" section is the
  # post-pivot default execution path.
  zone_entry_enabled: true
  # When `true` AND zone_entry_enabled, signals without a valid zone are
  # rejected with reason `no_setup_zone` (present in CLAUDE.md unified
  # reject list). When `false`, missing-zone signals fall back to the
  # legacy market-order path (hybrid mode — not what CLAUDE.md describes).
  zone_require_setup: true
  # 2026-04-28: 7 → 2 (~6 dk on 3m TF). Operator request — 3m VWAP drifts
  # cycle-to-cycle, a stale 21-min pending fills into a confluence picture
  # that may have decayed. Hard-gate invalidation already runs every cycle
  # (vwap_misaligned / ema_momentum_contra / cross_asset_opposition); this
  # change adds a tight time-budget on top so soft drift can't be bypassed
  # via "zone still technically holds" inertia. If a setup is still valid
  # at +6 min, the next cycle re-evaluates and places fresh. Re-eval after
  # 20 closed trades: zone_timeout_cancel rate <40% of total cancels = OK,
  # >60% = window too tight, raise to 3 bars.
  # 2026-04-30 Pass 3 Faz-A apply: 2 → 4 → 2026-05-01 REVERT + tighten:
  # 4 → 1 (~3 dk on 3m TF). Post-apply 19-trade window'da bars>2 dilimi
  # WR 20% / -3.44R; bars=2 dilimi de hasarlı (WR 20% / -3.35R). PRE-FazA
  # bars=1 sweet spot (n=18, WR 66.7%, +8.45R). Operator hipotezi: per-
  # cycle yeniden değerlendirme — pending 3 dk fill olmazsa cancel + bir
  # sonraki cycle setup_planner yeniden hesaplar. Kalite yüksek dilime
  # (bars 0+1) odaklanır. Operator approval 2026-05-01.
  zone_max_wait_bars: 1
  zone_buffer_atr: 0.25
  zone_sl_buffer_atr: 0.5
  # 2026-04-28: 2.0 → 1.5 in lockstep with trading.default_rr_ratio.
  zone_default_rr: 1.5
  # 2026-04-19 rebalance — zone-source priority is now
  # vwap_retest > ema21_pullback > fvg_entry > sweep_retest > liq_pool_near.
  # EMA21 pullback reuses analysis.ema_veto_{fast,slow}_period for the stack.
  ema21_pullback_enabled: true
  # HTF 15m FVG as ENTRY source — off by default (poor fit for 3m scalp TF).
  # It remains in `_tp_primary`'s alignment logic regardless.
  htf_fvg_entry_enabled: false
  # Near-liq entry gates. The old source placed limit orders AT the top
  # cluster (sweep-reversal thesis). Rewritten so liq-pool only fires when
  # the nearest cluster on the correct side is (a) within
  # `liq_entry_near_max_atr × ATR` of price AND (b) notional is
  # `liq_entry_magnitude_mult × median(side_clusters)`. Operator's
  # BTC-75000 / 74800-abnormal-support example.
  liq_entry_near_max_atr: 1.5
  liq_entry_magnitude_mult: 2.5
  # Partial-TP ladder from liquidity clusters on the target side.
  # Shares renormalise when fewer clusters pass the notional filter
  # (`tp_ladder_min_notional_frac × largest_side`). Empty list / single
  # [1.0] disables the ladder and keeps legacy single-leg TP behaviour.
  tp_ladder_enabled: true
  tp_ladder_shares: [0.40, 0.35, 0.25]
  tp_ladder_min_notional_frac: 0.30

  # 2026-04-19 (post-pivot diagnostic) — hard 1:N RR enforcement on the
  # final primary TP. Operator log on 2026-04-19 showed 5 zone_limit_placed
  # orders all sized off heatmap clusters that landed 8-12R away despite
  # symbol_decision claiming 4.5R. `apply_zone_to_plan` now forces
  # tp_price = entry ± target_rr_ratio × sl_distance and clamps every
  # ladder rung to that boundary. 0.0 = off (legacy heatmap-cluster TP).
  # 2026-04-21 (eve): 3.0 → 2.0 (operator tune, see trading.default_rr_ratio).
  # 2026-04-28: 2.0 → 1.5 paired with per-symbol SL-floor tighten. See
  # CLAUDE.md 2026-04-28 changelog entry; test_default_yaml_runner_tp_is_hard_1_2
  # locks this against trading.default_rr_ratio.
  target_rr_ratio: 1.5

  # Dynamic TP revision (live-data-driven). When true, the runner
  # periodically recomputes a fresh target from the live mark + the
  # SL distance fixed at fill (`target_rr_ratio × sl_dist applied to
  # the realised entry`) and re-OCOs the runner leg via cancel+place.
  # `tp_revise_min_delta_atr` × ATR is the minimum drift before a
  # revision triggers (avoids OCO churn on noise); `tp_revise_cooldown_s`
  # rate-limits revisions per position; `tp_min_rr_floor` prevents
  # revising into a sub-floor RR if mark drifts past entry.
  tp_dynamic_enabled: true
  # 2026-04-21 (eve): 1.5 → 1.0 after hard RR cap dropped 3.0 → 2.0.
  # Under 1:2, a 1.5R floor would bind on almost every revise attempt
  # (mark drift past entry on a 2R target routinely leaves <1.5R headroom).
  # 1.0R floor keeps revise active under the tighter ceiling.
  # 2026-04-28: 1.0 → 0.7 paired with target_rr_ratio drop 2.0 → 1.5. Same
  # logic — under 1:1.5, a 1.0R floor would bind once mark drifts >0.5R
  # favorably. 0.7R keeps dynamic TP revision active under the new ceiling.
  tp_min_rr_floor: 0.7
  tp_revise_min_delta_atr: 0.5
  tp_revise_cooldown_s: 30.0

  # 2026-04-20 — MFE-triggered SL lock (Option A). Once a position reaches
  # `sl_lock_mfe_r` in favor (measured as MFE / plan_sl_distance, i.e. R
  # multiples of the original risk), cancel + replace the runner OCO with
  # a new SL at ``entry + sign × sl_lock_at_r × plan_sl_distance``. With
  # `sl_lock_at_r: 0.0` the new SL sits at entry (± sl_be_offset_pct
  # fee buffer) — trade becomes risk-free. Set >0 to lock in profit
  # (e.g. 0.5 = guaranteed +0.5R). One-shot per position; subsequent
  # tightening would need a full trailing mechanic (Phase 12 Option B).
  # 2026-04-21 (eve): 2.0 → 1.3 after RR cap dropped to 2.0. Old threshold
  # coincided with the 2R TP — lock would never fire before TP. 1.3R ≈ 65%
  # of the 2R TP, preserving the "almost-win → risk-free" design intent
  # (old proportion was 2R / 3R = 67%).
  # 2026-04-28: 1.3 → 1.0 paired with target_rr_ratio drop 2.0 → 1.5. Under
  # 1:1.5, a 1.3R MFE sits 87% of the way to TP — lock would rarely fire
  # before TP. 1.0R = 67% of the 1.5R TP, preserves the original design
  # proportion (2R / 3R = 67%, 1.3R / 2R = 65%, 1.0R / 1.5R = 67%).
  sl_lock_enabled: true
  sl_lock_mfe_r: 1.0
  sl_lock_at_r: 0.0

  # 2026-04-19 — Position-attached TP/SL trigger price source. "mark" uses
  # Bybit's index-weighted mark price (cross-exchange VWAP across the
  # major real-market venues), "last" uses the Bybit book's last trade.
  # On demo the book has no real-market counterpart, so
  # demo-only wicks trigger `last`-based stops and poison the RL dataset
  # with artefact outcomes. Mark is index-computed from real exchanges →
  # immune to demo wicks. Keep "mark" for demo + live unless a specific
  # strategy benefits from book-native triggering.
  algo_trigger_px_type: "mark"

  # 2026-04-19 — post-close artefact cross-check. On every close, fetch the
  # concurrent 1m candle from Binance USD-M futures; flag the trade as
  # `demo_artifact=true` when entry or exit falls outside the real candle's
  # [low, high] band. Non-destructive — the trade still writes to the
  # journal; reporter + RL can filter on the flag. Tolerance widens the
  # band on both sides (5 bps default) to tolerate routine cross-exchange
  # microstructure skew without flagging benign differences.
  artefact_check_enabled: true
  artefact_check_timeout_s: 5.0
  artefact_check_tolerance_pct: 0.0005

derivatives:
  # Phase 1.5 — derivatives data layer. Disabling this short-circuits the
  # Binance WS + Coinalyze poll loop but leaves entry/exit logic untouched,
  # so the bot still trades on pure price structure.
  enabled: true
  liquidation_buffer_size: 5000
  liquidation_lookback_1h_ms: 3600000
  liquidation_lookback_4h_ms: 14400000
  liquidation_lookback_24h_ms: 86400000
  # 2026-04-19: 60→75 (7 pair eklendi; 60s'te 7 pair = 37.8/40 calls-per-min = %94
  # utilization, 429 riski. 75s'te ~30/40 = %75 — 5-pair eski durumu kadar rahat).
  coinalyze_refresh_interval_s: 75
  coinalyze_timeout_s: 10.0
  coinalyze_max_retries: 3
  # Liquidity heatmap (Madde 4) — estimated long/short liq levels bucketed
  # by leverage + merged with historical Binance liq events.
  heatmap_enabled: true
  heatmap_bucket_pct: 0.002
  heatmap_historical_lookback_ms: 172800000   # 48h
  heatmap_max_clusters_each_side: 10
  leverage_buckets:
    - [10, 0.30]
    - [25, 0.35]
    - [50, 0.20]
    - [100, 0.15]
  # Regime classifier (Madde 5). Thresholds below are BTC-safe; per-symbol
  # overrides scale capitulation_liq_notional down for thinner books.
  regime_thresholds:
    funding_crowded_z: 2.0
    ls_crowded_z: 2.0
    oi_surge_pct: 8.0
    oi_crash_pct: -10.0
    capitulation_liq_notional: 10000000     # $10M for BTC
    stale_snapshot_s: 180
  regime_per_symbol_overrides:
    ETH-USDT-SWAP:
      capitulation_liq_notional: 20000000   # $20M — ETH moves bigger liq rounds
    SOL-USDT-SWAP:
      capitulation_liq_notional: 8000000    # $8M — thinner book, smaller washes
    DOGE-USDT-SWAP:
      capitulation_liq_notional: 8000000    # $8M — momentum-driven, SOL-class book depth
    XRP-USDT-SWAP:
      capitulation_liq_notional: 8000000    # $8M — similar characteristic to DOGE
    ADA-USDT-SWAP:
      capitulation_liq_notional: 8000000    # $8M — SOL/DOGE-class book depth
    BNB-USDT-SWAP:
      capitulation_liq_notional: 15000000   # $15M — between BTC ($10M) and ETH ($20M)
  # Entry signal integration (Madde 6).
  confluence_slot_enabled: true
  crowded_skip_enabled: true
  crowded_skip_z_threshold: 3.0

economic_calendar:
  # Macro event blackout — skip new entries around HIGH-impact USD releases
  # (CPI, FOMC, NFP, PCE, FED minutes). Open positions untouched (their
  # OCO algos manage exit). Two-provider union with failure isolation:
  # any provider flagging a HIGH-impact event in the [-30min, +15min]
  # window activates blackout. Either provider failing alone is non-fatal;
  # both failing leaves the cache intact (soft fail = no blackout).
  enabled: true
  finnhub_enabled: true              # Finnhub /calendar/economic, key required
  faireconomy_enabled: true          # FairEconomy weekly JSON, no key
  blackout_minutes_before: 30
  blackout_minutes_after: 15
  impact_filter: ["High"]
  currencies: ["USD"]
  refresh_interval_s: 21600          # 6h — events are scheduled, no need to poll
  lookahead_days: 7
  finnhub_timeout_s: 10.0
  finnhub_max_retries: 3
  faireconomy_timeout_s: 10.0
  faireconomy_max_retries: 3

# ───────────────────────────────────────────────────────────────────
# 2026-04-21 — Arkham on-chain intelligence (trial 30-day key).
# Master kill switch: `enabled: false` → no Arkham HTTP requests, no
# WebSocket connection, MarketState.on_chain stays None, every gate /
# modifier reads as inert. Rolling back after the trial window = flip
# `enabled: false` and restart. Schema columns + journal writes stay
# in place so historical `on_chain_context` on pre-rollback trades is
# preserved (data loss = zero).
#
# Sub-features (each flag-gated independently — master must also be on):
#   * daily_bias_enabled       → Phase C confluence ±delta modifier.
#   * stablecoin_pulse_enabled → Phase E below_confluence penalty.
#   * whale_blackout_enabled   → Phase D hard gate via WS listener.
# Phase B (journal enrichment) rides the master flag — no separate flag;
# `on_chain_context` column stays NULL whenever snapshot is unavailable.
#
# Safety rails:
#   * api_usage_auto_disable_pct: auto-disable when reported label-usage
#     fraction crosses this %, prevents trial-key exhaustion.
#   * whale_threshold_usd ≥ 10M enforced by pydantic validator (Arkham
#     WS `usdGte` minimum). 100M default keeps signal high-SNR.
#   * daily_bias_modifier_delta ∈ [0.0, 0.5] — delta > 0.5 would swap
#     long/short rather than nudge.
# ───────────────────────────────────────────────────────────────────
on_chain:
  # 2026-04-21 — client patched against the real Arkham Intel v1.1 API
  # (paths + POST-for-session + v1 WS subscribe shape). Docs at
  # https://intel.arkm.com/api/docs. Master flipped back to TRUE; all 3
  # sub-features stay on. Rollback: flip `enabled: false` + restart.
  enabled: true                                   # master kill switch

  # Phase C — daily macro bias ± delta confluence modifier.
  # Bullish day → long scores × (1 + delta), short × (1 - delta); mirror for bearish.
  # Neutral or stale (>snapshot_staleness_threshold_s) → 1.0 (inert).
  # 2026-04-21 (eve) — bumped 0.10 → 0.15 after observing every daily-bias-opposed
  # setup still cleared the threshold. 1.5× makes penalty visible in the dataset
  # without over-filtering. Phase 9 GBT will dial in the final value.
  daily_bias_enabled: true
  daily_bias_modifier_delta: 0.15
  daily_bias_stablecoin_threshold_usd: 50000000.0  # ≥ this → bullish contribution
  daily_bias_btc_netflow_threshold_usd: 50000000.0 # ≤ -this → bullish (BTC leaving CEX)
  # 2026-04-23 — cadence for the "daily" bundle (bias + BTC/ETH 24h netflow
  # + per-entity Coinbase/Binance/Bybit 24h netflow). Was once-per-UTC-day,
  # which froze DB rows after the histogram rewrite. 5 min tracks Arkham's
  # ~60-120s indexer refresh; label-free histogram calls so 0 label burn.
  daily_snapshot_refresh_s: 300

  # Phase E — stablecoin hourly pulse; misaligned → +penalty on min_confluence threshold.
  # 2026-04-21 (eve) — bumped 0.5 → 0.75 paired with daily_bias bump. Re-eval
  # trigger: if penalty-induced below_confluence fraction is <5% of total rejects
  # after 30 closed trades, bump to 1.0; if >30%, drop back to 0.5.
  stablecoin_pulse_enabled: true
  stablecoin_pulse_refresh_s: 3600
  stablecoin_pulse_threshold_usd: 50000000.0
  stablecoin_pulse_penalty: 0.75

  # Phase D — Arkham whale-transfer pipeline.
  # 2026-04-22 (gece): RUNTIME HARD GATE REMOVED. Flag now only gates
  # the WS listener lifecycle; whale events flow into `whale_transfers`
  # journal table + `on_chain_snapshots.whale_blackout_active` bool
  # (informational). Entry pipeline + pending-limit invalidation no
  # longer react to whale events. flow_alignment soft signal (below)
  # replaces the directional intuition whale blackout attempted to capture.
  whale_blackout_enabled: true
  whale_threshold_usd: 10000000.0                  # WS filter (usdGte); ≥10M min (Arkham WS hard floor). 2026-04-22: 100M→150M halved label burn. 2026-04-26: 150M→75M after 24h of zero whale_transfers rows post-Bybit restart (Pass 2). 2026-04-28: 75M→10M after `parse_transfer_extras` audit confirmed whale events DO NOT burn labels (entity name comes pre-resolved in WS payload, no `/intelligence/address` lookup); operator's 558-stable observation post-2026-04-26 75M drop validated this. 10M = Arkham hard floor, max whale dataset density for Pass 3 GBT.
  whale_blackout_duration_s: 600                   # State-activity window (informational flag only, not a gate)
  # Token slug whitelist on the WS stream — only transfers in these
  # tokens reach the listener. Drops gross label-lookup tax from
  # noise tokens (ADA/MATIC/LINK etc.) that would never affect blackouts
  # since `affected_symbols_for` returns empty for them. 2026-04-22.
  # 2026-04-25 (Bybit migration): BNB swapped out for XRP in trading.symbols.
  # Note: XRP is NOT added here — Arkham doesn't index XRPL per-token
  # data (`/token/volume/{id}` rejects every XRP slug variant). XRP entries
  # therefore lose only `per_symbol_cex_flow_penalty`; all other Arkham
  # signals (daily_bias / stablecoin_pulse / altcoin_index /
  # flow_alignment) still apply because they're symbol-agnostic.
  whale_tokens:
    - bitcoin
    - ethereum
    - solana
    - dogecoin
    - tether
    - usd-coin

  # 2026-04-22 — per-entity (Coinbase + Binance + Bybit) 24h netflow.
  # Refreshes once per UTC day alongside daily_macro_bias. Journal-only.
  # Probe-confirmed: 3 credits/call, 0 label lookups per entity.
  entity_netflow_enabled: true

  # 2026-04-22 — per-symbol CEX hourly volume (`/token/volume/{id}` 1h
  # granularity, sub-hourly 5m/15m/30m return 500). 5 symbols hourly =
  # 360 calls/day = ~11k credits/month, 0 label lookups. Journal-only.
  token_volume_enabled: true
  token_volume_refresh_s: 3600                     # 1h cadence matches data granularity

  # Phase F2 (2026-04-21) — Arkham altcoin index modifier.
  # `/marketdata/altcoin_index` scalar 0-100. Low → altcoins underperforming
  # BTC (BTC-dominance regime). Applies ONLY to altcoin symbols (SOL/DOGE/BNB,
  # not BTC/ETH). Misaligned direction (altcoin long in BTC-dominance OR
  # altcoin short in altseason) bumps the `below_confluence` threshold.
  altcoin_index_enabled: true
  altcoin_index_bearish_threshold: 25              # index ≤ this → altcoin longs penalised
  altcoin_index_bullish_threshold: 75              # index ≥ this → altcoin shorts penalised
  altcoin_index_modifier_delta: 0.5                # threshold bump when misaligned
  altcoin_index_refresh_s: 3600                    # 1h — macro, no need to poll faster

  # 2026-04-22 (gece) — flow_alignment soft directional signal.
  # Combines SIX Arkham inputs into a [-1, +1] directional score:
  #   stablecoin pulse (0.25)  natural sign (IN=bullish)
  #   BTC netflow      (0.25)  inverted (OUT=bullish)
  #   ETH netflow      (0.15)  inverted
  #   Coinbase netflow (0.15)  inverted — "Coinbase premium" pattern
  #   Binance netflow  (0.10)  inverted — Asia retail flow
  #   Bybit netflow    (0.10)  inverted — leverage/derivatives flow
  # Per-entity inputs added 2026-04-22 (gece, late) when the journal-only
  # FAZ 2 columns were promoted to runtime ahead of the Pass 1 clean
  # restart. Misaligned direction pays additive penalty on
  # min_confluence_score, scaled linearly by |score|. Replaces the whale
  # blackout's directional intuition now that the hard gate is gone.
  # Ships with DEFAULT weight (Pass 1); Pass 2 tunes penalty + noise_floor
  # + individual input weights against uniform-coverage dataset.
  flow_alignment_enabled: true
  flow_alignment_penalty: 0.25                     # additive threshold bump on misalignment (full magnitude at |score|=1.0)
  flow_alignment_noise_floor_usd: 1000000.0        # sub-$1M signals treated as zero to filter noise

  # 2026-04-22 (gece, late) — per-symbol 1h CEX volume penalty.
  # Unlike stablecoins, token flowing INTO exchange is BEARISH for that
  # symbol (selling setup), OUT is BULLISH (cold wallet / DEX accumulation).
  # Misaligned direction on the traded symbol pays additive threshold bump.
  # Data source: Arkham `/token/volume/{id}?granularity=1h` most-recent
  # bucket's `inUSD - outUSD` per watched perp (internal-format symbol). Promoted to runtime
  # alongside per-entity netflow expansion.
  per_symbol_cex_flow_enabled: true
  per_symbol_cex_flow_penalty: 0.25                # same conservative default as flow_alignment
  per_symbol_cex_flow_noise_floor_usd: 5000000.0   # $5M — token volume on 1h bucket noisier than macro stablecoin pulse

  # Safety / budget controls.
  api_usage_auto_disable_pct: 95.0
  api_client_timeout_s: 10.0
  snapshot_staleness_threshold_s: 7200             # 2h — older snapshot reads inert

rl:
  # Phase 6.9 D1 — dirty-data cutoff for RL training + reporter.
  # Trades opened BEFORE this ISO-8601 timestamp are ignored by
  # `scripts/report.py` and (future) `scripts/train_rl.py`. Old rows stay in
  # the DB for comparison; this is a query-layer filter, not a delete.
  # Leave `null` to disable. Bump forward whenever a meaningful strategy
  # change lands (new confluence factor, min_confluence raise, SL logic),
  # so RL never trains on the pre-change regime.
