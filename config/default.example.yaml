# SMTbot — public starter config. Copy to `config/default.yaml` and tune
# from there. Real tuned values (operator's tracked dataset) live in the
# private gitignored copy; this file ships generic scalper baselines so a
# clone-and-run works without surfacing operator-tuned strategy weights.
#
# Knobs are documented inline. See README.md for the high-level workflow.

bot:
  mode: demo
  poll_interval_seconds: 5
  timezone: UTC
  starting_balance: 1000.0   # demo wallet baseline; live mode reads Bybit API directly

trading:
  # 5 USDT linear perps; max_concurrent_positions matches list length.
  symbols: [BTC-USDT-SWAP, ETH-USDT-SWAP, SOL-USDT-SWAP, DOGE-USDT-SWAP, XRP-USDT-SWAP]
  entry_timeframe: 3m
  htf_timeframe: 15m
  ltf_timeframe: 1m
  # Legacy percent-mode fallback. Used only when both auto_risk_pct_of_wallet
  # and risk_amount_usdt (and RISK_AMOUNT_USDT env) are off/null.
  risk_per_trade_pct: 1.0
  # Flat-$ override (escape hatch). When set, bypasses both auto and percent
  # mode. Env `RISK_AMOUNT_USDT` wins over this YAML value. Safety rail:
  # override <= 10% of account_balance (rr_system enforces).
  risk_amount_usdt: null
  # Auto-R: when null risk_amount_usdt AND > 0 here, every trade sizes
  # R = realized_wallet_balance * pct, freshly probed at entry.
  auto_risk_pct_of_wallet: 0.01
  # Round-trip taker reserve baked into sizing so a stop-out caps near $R
  # AFTER paying entry + exit taker fees. ~2x Bybit linear taker.
  fee_reserve_pct: 0.001
  max_leverage: 75
  default_rr_ratio: 2.0
  min_rr_ratio: 1.5
  max_concurrent_positions: 5
  contract_size: 0.01
  # Per-symbol leverage caps on top of Bybit instrument caps.
  # Effective ceiling = min(trading.max_leverage, bybit_cap, symbol_cap).
  symbol_leverage_caps:
    ETH-USDT-SWAP: 30
    DOGE-USDT-SWAP: 30
    XRP-USDT-SWAP: 30
  # Per-symbol swing_lookback override for SL sourcing on thin-book pairs.
  swing_lookback_per_symbol:
    DOGE-USDT-SWAP: 30
    XRP-USDT-SWAP: 30
  # Multi-pair settle budgets — wait after set_symbol / set_timeframe so
  # the heavy SMT Overlay Pine has time to recompute before we read.
  symbol_settle_seconds: 6.0
  tf_settle_seconds: 3.5
  pine_settle_max_wait_s: 10.0
  pine_settle_poll_interval_s: 0.3
  pine_post_settle_grace_s: 1.0

circuit_breakers:
  max_daily_loss_pct: 15.0
  max_consecutive_losses: 5
  max_drawdown_pct: 25.0
  cooldown_hours: 24

analysis:
  # Confluence floor — bars below this score are rejected with `below_confluence`.
  # Tune to your dataset; generic scalper baseline starts at 3.0 and lifts
  # over time as you collect data.
  min_confluence_score: 3.0
  candle_buffer_size: 500
  swing_lookback: 20
  sr_min_touches: 3
  sr_zone_atr_mult: 0.5
  session_filter:
    - london
    - new_york
  # Per-symbol session override — REPLACES the global filter for the listed pair.
  session_filter_per_symbol:
    SOL-USDT-SWAP: [london]
    DOGE-USDT-SWAP: [london]
    XRP-USDT-SWAP: [london]
  # HTF S/R TP-ceiling + SL-push gate. When true, TP gets clipped past the
  # HTF zone (rejects if trimmed RR < min_rr_ratio) AND SL gets pushed past
  # HTF zones. Disabled by default — opt-in after factor-audit shows lift.
  htf_sr_ceiling_enabled: false
  htf_sr_buffer_atr: 0.2
  htf_sr_buffer_atr_per_symbol:
    SOL-USDT-SWAP: 0.10
    DOGE-USDT-SWAP: 0.15
    XRP-USDT-SWAP: 0.15
  # Fee-aware min TP distance (fraction of entry price). 0.4% rejects plans
  # where 3x taker fee + slippage would eat the whole R.
  min_tp_distance_pct: 0.004
  # Min SL distance floor (fraction of entry). Sub-floor structural stops
  # are WIDENED to this distance (not rejected); notional shrinks to keep R
  # constant. ~10x typical demo-book spread, bigger than typical 3m wicks.
  min_sl_distance_pct: 0.005
  # Per-symbol SL floor override — tune per pair's typical 3m ATR%.
  # Lockstep mandate: tightening these without lowering target_rr_ratio
  # mechanically widens TP under fixed RR — ALWAYS move both together.
  min_sl_distance_pct_per_symbol:
    BTC-USDT-SWAP: 0.005
    ETH-USDT-SWAP: 0.008
    SOL-USDT-SWAP: 0.010
    DOGE-USDT-SWAP: 0.008
    XRP-USDT-SWAP: 0.008
  # Confluence weight overrides — empty {} = DEFAULT_WEIGHTS from
  # src/analysis/multi_timeframe.py. Tune per pillar after factor-audit.
  confluence_weights:
    htf_trend_alignment: 0.5
    mss_alignment: 0.75
    at_order_block: 0.6
    at_fvg: 0.75
    at_sr_zone: 0.75
    recent_sweep: 1.0
    ltf_pattern: 0.75
    oscillator_momentum: 0.75
    oscillator_signal: 0.75
    oscillator_high_conviction_signal: 1.5
    vmc_ribbon: 0.5
    ltf_momentum_alignment: 0.75
    money_flow_alignment: 1.0
    divergence_signal: 1.25
    displacement_candle: 0.6
    liquidity_pool_target: 0.5
    vwap_1m_alignment: 0.2
    vwap_3m_alignment: 0.0
    vwap_15m_alignment: 0.0
    vwap_composite_alignment: 1.25
    derivatives_contrarian: 0.7
    derivatives_capitulation: 0.6
    derivatives_heatmap_target: 0.5
    session_filter: 0.25
    # Multi-TF scalp confirmation (1m EMA21-55 ribbon + 1m MSS).
    ltf_ribbon_alignment: 0.25
    ltf_mss_alignment: 0.25
    # 15m MSS journal-only by default; flip to 0.25 if importance shows lift.
    htf_mss_alignment: 0.0
  # MFI bias magnitude floor. Below this the BULLISH/BEARISH tag is noise.
  min_rsi_mfi_magnitude: 2.0
  # Liquidity pool must sit within this xATR from price for the factor to fire.
  liquidity_pool_max_atr_dist: 3.0
  # VWAP hard veto — opt-in. Reject entries on the wrong side of EVERY
  # available VWAP for the proposed direction.
  vwap_hard_veto_enabled: false
  # EMA stack momentum veto on the entry TF. Bull stack blocks bearish entries
  # and vice-versa. Rule #1 of the strategy: don't fight the EMA stack.
  ema_veto_enabled: true
  ema_veto_fast_period: 21
  ema_veto_slow_period: 55
  # Cross-asset BTC/ETH veto. Modes:
  #   "both"          — legacy (altcoin only, BTC AND ETH ters, fail-open)
  #   "eth_anchored"  — pair-bound (BTC<->ETH symmetric + altcoin BTC OR ETH ters,
  #                      fail-CLOSED on missing/stale)
  cross_asset_veto_enabled: true
  cross_asset_veto_mode: both
  cross_asset_veto_max_age_s: 300.0
  # Premium/discount zone veto — opt-in soft gate.
  premium_discount_veto_enabled: false
  premium_discount_lookback: 40
  # Displacement candle factor — body >= atr_mult * ATR within max_bars_ago.
  displacement_atr_mult: 1.5
  displacement_max_bars_ago: 5
  # Divergence bar-ago decay bands.
  divergence_fresh_bars: 3
  divergence_decay_bars: 6
  divergence_max_bars: 9
  # ADX trend-regime classifier + conditional factor scoring.
  trend_regime_conditional_scoring_enabled: true
  adx_period: 14
  trend_regime_ranging_threshold: 20.0
  trend_regime_strong_threshold: 30.0
  # VWAP-band zone anchor (Convention X). Long [0.5, 1.0], short [0.0, 0.5].
  # 0.7 / 0.3 = 40% of band-half away from VWAP on the directional side.
  vwap_zone_long_anchor: 0.7
  vwap_zone_short_anchor: 0.3
  # VWAP daily-reset blackout (UTC midnight). Pine VWAPs re-anchor on the
  # session change; the +/-1sigma band is collapsed for the first window
  # post-reset and `vwap_composite_alignment` reads near-noise.
  vwap_reset_blackout_enabled: true
  vwap_reset_blackout_window_pre_min: 0
  vwap_reset_blackout_window_post_min: 30

bybit:
  base_url: https://api-demo.bybit.com
  demo: true
  account_type: UNIFIED
  category: linear

journal:
  db_path: "data/trades.db"
  # Intra-trade snapshot writer for RL trajectory analysis. Reuses cached
  # state — zero extra Bybit/TV calls.
  position_snapshot_enabled: true
  # Cadence in seconds; validator clamps [60, 3600]. Match cycle time on
  # 3m TF (~180s) so snaps don't outpace the data they capture.
  position_snapshot_cadence_s: 180

reentry:
  min_bars_after_close: 3
  min_atr_move: 0.5
  require_higher_confluence_after_win: true
  require_higher_or_equal_confluence_after_loss: true

execution:
  margin_mode: cross
  # Partial TP + move SL to BE on TP1. Disabled by default; with hard 1:N
  # RR cap a single-leg TP keeps the full planned reward on winners.
  partial_tp_enabled: false
  partial_tp_ratio: 0.5
  partial_tp_rr: 1.5
  move_sl_to_be_after_tp1: true
  # Buffer past entry when SL moves to BE — covers remaining exit taker fee.
  sl_be_offset_pct: 0.001
  # LTF reversal defensive close — close on opposing 1m confluence.
  ltf_reversal_close_enabled: true
  ltf_reversal_min_confluence: 3
  ltf_reversal_min_bars_in_position: 2
  ltf_reversal_signal_max_age: 3
  # Zone-based limit entry. setup_planner builds a ZoneSetup from the picked
  # confluence direction, rewrites plan to structural levels, places post-only.
  zone_entry_enabled: true
  zone_require_setup: true
  # Pending limit timeout in entry-TF bars. Tighter = fresher re-evaluation
  # each cycle; looser = more fills on slow setups.
  zone_max_wait_bars: 4
  zone_buffer_atr: 0.25
  zone_sl_buffer_atr: 0.5
  zone_default_rr: 2.0
  ema21_pullback_enabled: true
  htf_fvg_entry_enabled: false
  liq_entry_near_max_atr: 1.5
  liq_entry_magnitude_mult: 2.5
  tp_ladder_enabled: true
  tp_ladder_shares: [0.40, 0.35, 0.25]
  tp_ladder_min_notional_frac: 0.30
  # Hard 1:N RR enforcement on the final primary TP. apply_zone_to_plan
  # forces tp_price = entry +/- target_rr_ratio * sl_distance.
  target_rr_ratio: 2.0
  # Regime-aware target_rr_ratio override (optional). When populated, replaces
  # the global target on a per-regime basis. Empty dict {} = global only.
  # Lockstep mandate: tp_min_rr_floor_per_regime below should scale ~50% of
  # each target so dynamic-TP can't push the revise into a vanishing-RR.
  target_rr_ratio_per_regime:
    RANGING: 1.5
    WEAK_TREND: 2.0
    STRONG_TREND: 3.0
  # Dynamic TP revision (live-data-driven). Recomputes target from live mark
  # + fixed plan_sl_dist; re-attaches via trading-stop on drift.
  tp_dynamic_enabled: true
  tp_min_rr_floor: 1.0
  tp_revise_min_delta_atr: 0.5
  tp_revise_cooldown_s: 30.0
  tp_min_rr_floor_per_regime:
    RANGING: 0.75
    WEAK_TREND: 1.0
    STRONG_TREND: 1.5
  # MFE-triggered SL lock (one-shot). Once MFE >= sl_lock_mfe_r in favor,
  # pull SL to entry +/- sl_lock_at_r * plan_sl_distance.
  # sl_lock_at_r = 0.0 -> SL sits at entry (+/- sl_be_offset_pct fee buffer).
  sl_lock_enabled: true
  sl_lock_mfe_r: 1.5
  sl_lock_at_r: 0.0
  # Multi-step trailing SL after MFE-lock. Once MFE >= trail_arm_at_mfe_r,
  # every additional trail_step_r advance pulls SL forward to
  # `MFE - trail_distance_r`. Monotonic — never widens SL backward.
  # Disable in regimes where TP fires before trailing would arm.
  trail_sl_enabled: true
  trail_arm_at_mfe_r: 2.0
  trail_step_r: 0.5
  trail_distance_r: 0.5
  trail_disabled_regimes:
    - RANGING
  # MAE-triggered BE-lock with LIMIT-based exit (one-shot).
  #   1. MAE crosses mae_be_lock_threshold_r -> arm
  #   2. Mark recovers within mae_be_lock_recovery_band_r of entry
  #   3. LTF direction signal still adverse to position
  #   4. Place reduce-only post-only LIMIT at entry +/- sl_be_offset_pct
  # Position-attached SL stays as backup.
  mae_be_lock_enabled: true
  mae_be_lock_threshold_r: -0.6
  mae_be_lock_recovery_band_r: 0.1
  mae_be_lock_disabled_regimes: []
  # Weakening-momentum defensive exit. Close when cycle-on-cycle directional
  # confluence falls monotonically AND position is in profit.
  weakening_exit_enabled: true
  weakening_min_cycles: 3
  weakening_min_score_drop: 0.5
  weakening_min_mfe_r: 0.5
  weakening_max_history: 8
  # Position-attached TP/SL trigger price source. "mark" (index-weighted,
  # multi-exchange VWAP) is immune to demo wicks; "last" uses Bybit book.
  algo_trigger_px_type: "mark"
  # Post-close artefact cross-check — fetch concurrent 1m candle from
  # Binance USD-M futures; flag trade if entry/exit falls outside band.
  artefact_check_enabled: true
  artefact_check_timeout_s: 5.0
  artefact_check_tolerance_pct: 0.0005

derivatives:
  enabled: true
  liquidation_buffer_size: 5000
  liquidation_lookback_1h_ms: 3600000
  liquidation_lookback_4h_ms: 14400000
  liquidation_lookback_24h_ms: 86400000
  coinalyze_refresh_interval_s: 75
  coinalyze_timeout_s: 10.0
  coinalyze_max_retries: 3
  heatmap_enabled: true
  heatmap_bucket_pct: 0.002
  heatmap_historical_lookback_ms: 172800000
  heatmap_max_clusters_each_side: 10
  leverage_buckets:
    - [10, 0.30]
    - [25, 0.35]
    - [50, 0.20]
    - [100, 0.15]
  regime_thresholds:
    funding_crowded_z: 2.0
    ls_crowded_z: 2.0
    oi_surge_pct: 8.0
    oi_crash_pct: -10.0
    capitulation_liq_notional: 10000000
    stale_snapshot_s: 180
  regime_per_symbol_overrides:
    ETH-USDT-SWAP:
      capitulation_liq_notional: 20000000
    SOL-USDT-SWAP:
      capitulation_liq_notional: 8000000
    DOGE-USDT-SWAP:
      capitulation_liq_notional: 8000000
    XRP-USDT-SWAP:
      capitulation_liq_notional: 8000000
  confluence_slot_enabled: true
  crowded_skip_enabled: true
  crowded_skip_z_threshold: 3.0

economic_calendar:
  enabled: true
  finnhub_enabled: true
  faireconomy_enabled: true
  blackout_minutes_before: 30
  blackout_minutes_after: 15
  impact_filter: ["High"]
  currencies: ["USD"]
  refresh_interval_s: 21600
  lookahead_days: 7
  finnhub_timeout_s: 10.0
  finnhub_max_retries: 3
  faireconomy_timeout_s: 10.0
  faireconomy_max_retries: 3

# Arkham on-chain intelligence — disabled in this starter. Set ARKHAM_API_KEY
# in .env and flip `enabled: true` to activate. The trial key is operator-
# specific; without one this section stays inert (every modifier reads as 1.0,
# every penalty as 0.0).
on_chain:
  enabled: false
  daily_bias_enabled: true
  daily_bias_modifier_delta: 0.10
  daily_bias_stablecoin_threshold_usd: 50000000.0
  daily_bias_btc_netflow_threshold_usd: 50000000.0
  daily_snapshot_refresh_s: 300
  stablecoin_pulse_enabled: true
  stablecoin_pulse_refresh_s: 3600
  stablecoin_pulse_threshold_usd: 50000000.0
  stablecoin_pulse_penalty: 0.5
  whale_blackout_enabled: true
  whale_threshold_usd: 10000000.0
  whale_blackout_duration_s: 600
  whale_tokens:
    - bitcoin
    - ethereum
    - solana
    - dogecoin
    - tether
    - usd-coin
  entity_netflow_enabled: true
  token_volume_enabled: true
  token_volume_refresh_s: 3600
  altcoin_index_enabled: true
  altcoin_index_bearish_threshold: 25
  altcoin_index_bullish_threshold: 75
  altcoin_index_modifier_delta: 0.5
  altcoin_index_refresh_s: 3600
  flow_alignment_enabled: true
  flow_alignment_penalty: 0.25
  flow_alignment_noise_floor_usd: 1000000.0
  per_symbol_cex_flow_enabled: true
  per_symbol_cex_flow_penalty: 0.25
  per_symbol_cex_flow_noise_floor_usd: 5000000.0
  api_usage_auto_disable_pct: 95.0
  api_client_timeout_s: 10.0
  snapshot_staleness_threshold_s: 7200

rl:
  # Dirty-data cutoff for RL training + reporter. Trades opened BEFORE this
  # ISO-8601 timestamp are ignored by scripts/report.py and (future) RL
  # training scripts. Bump forward whenever a meaningful strategy change
  # lands so RL never trains on the pre-change regime. Leave null to disable.
  clean_since: null
